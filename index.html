<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Correct your text in images</title>
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <!-- React & ReactDOM -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js" crossorigin></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js" crossorigin></script>
    <!-- Babel for JSX -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <!-- Lucide Icons -->
    <script src="https://unpkg.com/lucide@latest"></script>

    <style>
        body { margin: 0; background-color: #0B1120; color: white; font-family: 'Inter', sans-serif; overflow: hidden; }
        .sidebar-left { background-color: #1E293B; }
        .top-bar { background-color: #1E293B; }
        .sidebar-right { background-color: #1E293B; border-left: 1px solid #334155; }
        /* 줌/팬 적용을 위해 캔버스 컨테이너 수정 */
        .canvas-container { position: relative; overflow: hidden; background-color: #0B1120; height: 100%; width: 100%; }
        /* 커스텀 스크롤바 */
        .sidebar-right::-webkit-scrollbar { width: 6px; }
        .sidebar-right::-webkit-scrollbar-track { background: transparent; }
        .sidebar-right::-webkit-scrollbar-thumb { background: #475569; border-radius: 3px; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useRef, useEffect, useCallback } = React;

        // 추가된 아이콘 (도구 토글용)
        const IconCrosshair = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="22" x2="18" y1="12" y2="12"/><line x1="6" x2="2" y1="12" y2="12"/><line x1="12" x2="12" y1="6" y2="2"/><line x1="12" x2="12" y1="22" y2="18"/></svg>;
        const IconHand = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M18 11V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v0"/><path d="M14 10V4a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v2"/><path d="M10 10.5V6a2 2 0 0 0-2-2v0a2 2 0 0 0-2 2v8"/><path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/></svg>;
        const IconFocus = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="3"/><path d="M3 7V5a2 2 0 0 1 2-2h2"/><path d="M17 3h2a2 2 0 0 1 2 2v2"/><path d="M21 17v2a2 2 0 0 1-2 2h-2"/><path d="M7 21H5a2 2 0 0 1-2-2v-2"/></svg>;

        const IconHistory = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 12a9 9 0 1 0 9-9 9.75 9.75 0 0 0-6.74 2.74L3 8"/><path d="M3 3v5h5"/><path d="M12 7v5l4 2"/></svg>;
        const IconTrash2 = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 6h18"/><path d="M19 6v14c0 1-1 2-2 2H7c-1 0-2-1-2-2V6"/><path d="M8 6V4c0-1 1-2 2-2h4c1 0 2 1 2 2v2"/><line x1="10" x2="10" y1="11" y2="17"/><line x1="14" x2="14" y1="11" y2="17"/></svg>;
        const IconUpload = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="17 8 12 3 7 8"/><line x1="12" x2="12" y1="3" y2="15"/></svg>;
        const IconDownload = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"/><polyline points="7 10 12 15 17 10"/><line x1="12" x2="12" y1="15" y2="3"/></svg>;
        const IconFileDown = () => <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M14.5 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V7.5L14.5 2z"/><polyline points="14 2 14 8 20 8"/><path d="M12 18v-6"/><path d="m9 15 3 3 3-3"/></svg>;
        const IconImage = () => <svg xmlns="http://www.w3.org/2000/svg" width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="#475569" strokeWidth="1" strokeLinecap="round" strokeLinejoin="round"><rect width="18" height="18" x="3" y="3" rx="2" ry="2"/><circle cx="9" cy="9" r="2"/><path d="m21 15-3.086-3.086a2 2 0 0 0-2.828 0L6 21"/></svg>;
        const IconInfo = () => <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="#475569" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="12" cy="12" r="10"/><line x1="12" x2="12" y1="16" y2="12"/><line x1="12" x2="12.01" y1="8" y2="8"/></svg>;
        const IconCheck = () => <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><polyline points="20 6 9 17 4 12"/></svg>;
        
        // 추가된 아이콘
        const IconUndo = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>;
        const IconRedo = () => <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M21 7v6h-6"/><path d="M3 17a9 9 0 0 1 9-9 9 9 0 0 1 6 2.3l3 2.7"/></svg>;
        const IconZoomIn = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/><line x1="11" x2="11" y1="8" y2="14"/><line x1="8" x2="14" y1="11" y2="11"/></svg>;
        const IconZoomOut = () => <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><circle cx="11" cy="11" r="8"/><line x1="21" x2="16.65" y1="21" y2="16.65"/><line x1="8" x2="14" y1="11" y2="11"/></svg>;

        const App = () => {
            const [apiKey, setApiKey] = useState("");
            const [image, setImage] = useState(null);
            const [imageObj, setImageObj] = useState(null);
            
            // Editor State
            const [activeTool, setActiveTool] = useState('DRAW'); // 'DRAW', 'PAN', 'CONTEXT'
            const [boxes, setBoxes] = useState([]);
            const [contextRegions, setContextRegions] = useState([]); // Context Boxes
            const [selectedBoxId, setSelectedBoxId] = useState(null);
            
            // Interaction Modes: IDLE, DRAWING, DRAWING_CONTEXT, PANNING, MOVING, RESIZE_TL, RESIZE_TR, RESIZE_BL, RESIZE_BR
            const [mode, setMode] = useState('IDLE');
            const [startPos, setStartPos] = useState({ x: 0, y: 0 });
            const [currentRect, setCurrentRect] = useState(null);
            const [isExtracting, setIsExtracting] = useState(false);
            
            // Viewport (Zoom & Pan)
            const [view, setView] = useState({ scale: 1, panX: 0, panY: 0 });
            const [lastPan, setLastPan] = useState({ x: 0, y: 0 });
            const [dragOffset, setDragOffset] = useState({ x: 0, y: 0 });
            const [hoverCursor, setHoverCursor] = useState('cursor-crosshair');

            // Refs
            const containerRef = useRef(null);
            const displayCanvasRef = useRef(null);

            // Refs for event listeners
            const selectedBoxIdRef = useRef(null);
            const boxesRef = useRef([]);
            const contextRegionsRef = useRef([]);

            useEffect(() => {
                selectedBoxIdRef.current = selectedBoxId;
            }, [selectedBoxId]);

            useEffect(() => {
                boxesRef.current = boxes;
            }, [boxes]);

            useEffect(() => {
                contextRegionsRef.current = contextRegions;
            }, [contextRegions]);

            // History for Undo/Redo
            const historyRef = useRef([{ boxes: [], imageSrc: null }]);
            const historyStepRef = useRef(0);
            const [historyStep, setHistoryStep] = useState(0);

            // Reset Modal State
            const [showResetModal, setShowResetModal] = useState(false);

            // History Helpers
            const pushHistory = useCallback((newBoxes, newImgSrc = null) => {
                const h = historyRef.current.slice(0, historyStepRef.current + 1);
                h.push({
                    boxes: JSON.parse(JSON.stringify(newBoxes)),
                    imageSrc: newImgSrc !== null ? newImgSrc : h[h.length - 1].imageSrc
                });
                if (h.length > 50) h.shift(); // Limit history memory
                historyRef.current = h;
                historyStepRef.current = h.length - 1;
                setHistoryStep(historyStepRef.current);
            }, []);

            const undo = useCallback(() => {
                if (historyStepRef.current > 0) {
                    historyStepRef.current -= 1;
                    const state = historyRef.current[historyStepRef.current];
                    setBoxes(state.boxes);
                    
                    if (state.imageSrc !== historyRef.current[historyStepRef.current + 1].imageSrc) {
                        const img = new Image();
                        img.onload = () => setImageObj(img);
                        img.src = state.imageSrc;
                    }
                    
                    setHistoryStep(historyStepRef.current);
                    setSelectedBoxId(null);
                }
            }, []);

            const redo = useCallback(() => {
                if (historyStepRef.current < historyRef.current.length - 1) {
                    historyStepRef.current += 1;
                    const state = historyRef.current[historyStepRef.current];
                    setBoxes(state.boxes);
                    
                    if (state.imageSrc !== historyRef.current[historyStepRef.current - 1].imageSrc) {
                        const img = new Image();
                        img.onload = () => setImageObj(img);
                        img.src = state.imageSrc;
                    }
                    
                    setHistoryStep(historyStepRef.current);
                    setSelectedBoxId(null);
                }
            }, []);

            // Keyboard Shortcuts (Space for Pan, Ctrl+Z, Ctrl+Y, Ctrl+B)
            useEffect(() => {
                const handleKeyDown = (e) => {
                    if (e.code === 'Space' && e.target.tagName !== 'INPUT' && e.target.tagName !== 'TEXTAREA') {
                        e.preventDefault();
                        window.__isSpaceDown = true;
                        setHoverCursor('cursor-grab');
                    }
                    if (e.ctrlKey || e.metaKey) {
                        if (e.key.toLowerCase() === 'z') { e.preventDefault(); undo(); }
                        if (e.key.toLowerCase() === 'y') { e.preventDefault(); redo(); }
                        if (e.key.toLowerCase() === 'b') {
                            e.preventDefault();
                            const currentId = selectedBoxIdRef.current;
                            if (currentId) {
                                const currentBoxes = boxesRef.current;
                                const targetBox = currentBoxes.find(b => b.id === currentId);
                                if (targetBox) {
                                    const newWeight = targetBox.weight === 'Bold' ? 'Normal' : 'Bold';
                                    const nextBoxes = currentBoxes.map(b => b.id === currentId ? { ...b, weight: newWeight } : b);
                                    setBoxes(nextBoxes);
                                    pushHistory(nextBoxes);
                                }
                            }
                        }
                    }
                };
                const handleKeyUp = (e) => {
                    if (e.code === 'Space') {
                        window.__isSpaceDown = false;
                        setHoverCursor('cursor-crosshair');
                    }
                };
                window.addEventListener('keydown', handleKeyDown);
                window.addEventListener('keyup', handleKeyUp);
                return () => {
                    window.removeEventListener('keydown', handleKeyDown);
                    window.removeEventListener('keyup', handleKeyUp);
                };
            }, [undo, redo]);

            // Mouse Wheel Zoom & Touchpad Pan
            useEffect(() => {
                const container = containerRef.current;
                if (!container) return;
                
                const handleWheelNative = (e) => {
                    e.preventDefault(); 
                    const rect = container.getBoundingClientRect();
                    const mouseX = e.clientX - rect.left;
                    const mouseY = e.clientY - rect.top;

                    if (e.ctrlKey || e.metaKey) {
                        // Pinch to Zoom (Ctrl + Wheel)
                        setView(v => {
                            const zoomAmount = e.deltaY > 0 ? 0.9 : 1.1;
                            const newScale = Math.min(Math.max(0.05, v.scale * zoomAmount), 10);
                            const unscaledX = (mouseX - v.panX) / v.scale;
                            const unscaledY = (mouseY - v.panY) / v.scale;

                            return {
                                scale: newScale,
                                panX: mouseX - unscaledX * newScale,
                                panY: mouseY - unscaledY * newScale
                            };
                        });
                    } else {
                        // Two-finger Touchpad Pan (Regular Wheel without Ctrl)
                        setView(v => ({
                            ...v,
                            panX: v.panX - e.deltaX,
                            panY: v.panY - e.deltaY
                        }));
                    }
                };
                
                container.addEventListener('wheel', handleWheelNative, { passive: false });
                return () => container.removeEventListener('wheel', handleWheelNative);
            }, [image]);

            // Load Image logic
            const handleImageUpload = (e) => {
                const file = e.target.files[0];
                if (file) {
                    const reader = new FileReader();
                    reader.onload = (event) => {
                        setImage(event.target.result);
                        const img = new Image();
                        img.onload = () => {
                            setImageObj(img);
                            setBoxes([]); 
                            setSelectedBoxId(null);
                            
                            historyRef.current = [{ boxes: [], imageSrc: event.target.result }];
                            historyStepRef.current = 0;
                            setHistoryStep(0);
                            
                            // Initialize Fit Zoom
                            if (containerRef.current) {
                                const cw = containerRef.current.clientWidth;
                                const ch = containerRef.current.clientHeight;
                                const fitScale = Math.min(cw / img.width, ch / img.height) * 0.9;
                                setView({
                                    panX: (cw - img.width * fitScale) / 2,
                                    panY: (ch - img.height * fitScale) / 2,
                                    scale: fitScale
                                });
                            }
                        };
                        img.src = event.target.result;
                    };
                    reader.readAsDataURL(file);
                }
            };

            // Canvas Drawing Logic
            const drawCanvas = useCallback(() => {
                if (!imageObj || !displayCanvasRef.current) return;
                
                const canvas = displayCanvasRef.current;
                const ctx = canvas.getContext('2d');
                
                if (canvas.width !== imageObj.width) canvas.width = imageObj.width;
                if (canvas.height !== imageObj.height) canvas.height = imageObj.height;

                ctx.clearRect(0, 0, canvas.width, canvas.height);
                ctx.drawImage(imageObj, 0, 0);

                boxes.forEach(box => {
                    ctx.fillStyle = box.bgColor || '#1E293B'; 
                    ctx.fillRect(box.x, box.y, box.w, box.h);

                    ctx.fillStyle = box.color;
                    ctx.font = `${box.weight === 'Bold' ? 'bold' : 'normal'} ${box.size}px ${box.font}`;
                    ctx.textAlign = box.align === 'center' ? 'center' : (box.align === 'right' ? 'right' : 'left');
                    ctx.textBaseline = box.valign === 'middle' ? 'middle' : (box.valign === 'bottom' ? 'bottom' : 'top');

                    let textX = box.x;
                    if (box.align === 'center') textX = box.x + box.w / 2;
                    else if (box.align === 'right') textX = box.x + box.w;

                    let textY = box.y;
                    if (box.valign === 'middle') textY = box.y + box.h / 2;
                    else if (box.valign === 'bottom') textY = box.y + box.h;

                    ctx.fillText(box.currentText, textX, textY);

                    // Selection Outline and Handles
                    if (box.id === selectedBoxId) {
                        ctx.strokeStyle = '#3B82F6';
                        ctx.lineWidth = 2 / view.scale; // Maintain visual line width
                        ctx.setLineDash([5 / view.scale, 5 / view.scale]);
                        ctx.strokeRect(box.x, box.y, box.w, box.h);
                        
                        ctx.fillStyle = '#3B82F6';
                        ctx.setLineDash([]);
                        const hs = 8 / view.scale; // Handle visual size
                        ctx.fillRect(box.x - hs/2, box.y - hs/2, hs, hs);
                        ctx.fillRect(box.x + box.w - hs/2, box.y - hs/2, hs, hs);
                        ctx.fillRect(box.x - hs/2, box.y + box.h - hs/2, hs, hs);
                        ctx.fillRect(box.x + box.w - hs/2, box.y + box.h - hs/2, hs, hs);
                    }
                });

                // Context Regions Draw
                contextRegions.forEach(ctxBox => {
                    ctx.strokeStyle = '#10B981'; // Emerald/Green for Context
                    ctx.lineWidth = 2 / view.scale;
                    ctx.setLineDash([5 / view.scale, 5 / view.scale]);
                    ctx.strokeRect(ctxBox.x, ctxBox.y, ctxBox.w, ctxBox.h);
                    
                    ctx.fillStyle = 'rgba(16, 185, 129, 0.15)';
                    ctx.fillRect(ctxBox.x, ctxBox.y, ctxBox.w, ctxBox.h);

                    ctx.fillStyle = '#10B981';
                    ctx.font = `${Math.max(12 / view.scale, 10)}px Inter`;
                    ctx.textAlign = 'left';
                    ctx.textBaseline = 'bottom';
                    ctx.fillText("Context", ctxBox.x, ctxBox.y - 4 / view.scale);
                });

                if (mode === 'DRAWING' && currentRect) {
                    ctx.strokeStyle = '#3B82F6';
                    ctx.lineWidth = 2 / view.scale;
                    ctx.setLineDash([5 / view.scale, 5 / view.scale]);
                    ctx.fillStyle = 'rgba(59, 130, 246, 0.2)';
                    ctx.fillRect(currentRect.x, currentRect.y, currentRect.w, currentRect.h);
                    ctx.strokeRect(currentRect.x, currentRect.y, currentRect.w, currentRect.h);
                } else if (mode === 'DRAWING_CONTEXT' && currentRect) {
                    ctx.strokeStyle = '#10B981';
                    ctx.lineWidth = 2 / view.scale;
                    ctx.setLineDash([5 / view.scale, 5 / view.scale]);
                    ctx.fillStyle = 'rgba(16, 185, 129, 0.2)';
                    ctx.fillRect(currentRect.x, currentRect.y, currentRect.w, currentRect.h);
                    ctx.strokeRect(currentRect.x, currentRect.y, currentRect.w, currentRect.h);
                }
            }, [imageObj, boxes, contextRegions, selectedBoxId, mode, currentRect, view.scale]);

            useEffect(() => { drawCanvas(); }, [drawCanvas]);

            // Mouse Interactions Logic
            const getMousePosInImage = (e) => {
                const rect = containerRef.current.getBoundingClientRect();
                const cx = e.clientX - rect.left;
                const cy = e.clientY - rect.top;
                return {
                    x: (cx - view.panX) / view.scale,
                    y: (cy - view.panY) / view.scale
                };
            };

            const checkHandleHit = (x, y, box) => {
                const hs = 8 / view.scale;
                const hit = (hx, hy) => x >= hx - hs && x <= hx + hs && y >= hy - hs && y <= hy + hs;
                if (hit(box.x, box.y)) return 'RESIZE_TL';
                if (hit(box.x + box.w, box.y)) return 'RESIZE_TR';
                if (hit(box.x, box.y + box.h)) return 'RESIZE_BL';
                if (hit(box.x + box.w, box.y + box.h)) return 'RESIZE_BR';
                return null;
            };

            const handleMouseDown = (e) => {
                if (e.button === 1 || window.__isSpaceDown || (e.button === 0 && activeTool === 'PAN')) {
                    const { x, y } = getMousePosInImage(e);
                    const hitBox = [...boxes].reverse().find(b => x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h);
                    if (hitBox) setSelectedBoxId(hitBox.id);
                    else setSelectedBoxId(null);
                    
                    setMode('PANNING');
                    setLastPan({ x: e.clientX, y: e.clientY });
                    return;
                }

                const { x, y } = getMousePosInImage(e);

                if (activeTool === 'CONTEXT') {
                    setMode('DRAWING_CONTEXT');
                    setSelectedBoxId(null);
                    setStartPos({ x, y });
                    setCurrentRect({ x, y, w: 0, h: 0 });
                    return;
                }

                // Priority 1: Handles
                if (selectedBoxId) {
                    const box = boxes.find(b => b.id === selectedBoxId);
                    if (box) {
                        const hit = checkHandleHit(x, y, box);
                        if (hit) { setMode(hit); return; }
                    }
                }

                // Priority 2: Inside Box
                const hitBox = [...boxes].reverse().find(b => x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h);
                if (hitBox) {
                    setSelectedBoxId(hitBox.id);
                    setMode('MOVING');
                    setDragOffset({ x: x - hitBox.x, y: y - hitBox.y });
                    return;
                }

                // Default: Drawing new box
                setSelectedBoxId(null);
                setMode('DRAWING');
                setStartPos({ x, y });
                setCurrentRect({ x, y, w: 0, h: 0 });
            };

            const handleMouseMove = (e) => {
                // Determine hover cursor style when idle
                if (mode === 'IDLE') {
                    if (window.__isSpaceDown || activeTool === 'PAN') { 
                        setHoverCursor('cursor-grab'); 
                        return; 
                    }
                    const { x, y } = getMousePosInImage(e);
                    const handleHit = selectedBoxId ? checkHandleHit(x, y, boxes.find(b => b.id === selectedBoxId)) : null;
                    if (handleHit) {
                        if (handleHit === 'RESIZE_TL' || handleHit === 'RESIZE_BR') setHoverCursor('cursor-nwse-resize');
                        else setHoverCursor('cursor-nesw-resize');
                    } else {
                        const hitBox = boxes.find(b => x >= b.x && x <= b.x + b.w && y >= b.y && y <= b.y + b.h);
                        setHoverCursor(hitBox ? 'cursor-move' : 'cursor-crosshair');
                    }
                    return;
                }

                if (mode === 'PANNING') {
                    const dx = e.clientX - lastPan.x;
                    const dy = e.clientY - lastPan.y;
                    setView(v => ({ ...v, panX: v.panX + dx, panY: v.panY + dy }));
                    setLastPan({ x: e.clientX, y: e.clientY });
                    return;
                }

                const { x, y } = getMousePosInImage(e);

                if (mode === 'DRAWING' || mode === 'DRAWING_CONTEXT') {
                    const w = x - startPos.x;
                    const h = y - startPos.y;
                    setCurrentRect({
                        x: w < 0 ? x : startPos.x,
                        y: h < 0 ? y : startPos.y,
                        w: Math.abs(w),
                        h: Math.abs(h)
                    });
                } else if (mode === 'MOVING') {
                    setBoxes(prev => prev.map(b => b.id === selectedBoxId ? { ...b, x: x - dragOffset.x, y: y - dragOffset.y } : b));
                } else if (mode.startsWith('RESIZE_')) {
                    setBoxes(prev => prev.map(b => {
                        if (b.id !== selectedBoxId) return b;
                        let newX = b.x, newY = b.y, newW = b.w, newH = b.h;
                        if (mode === 'RESIZE_TL') { newW = b.w + (b.x - x); newH = b.h + (b.y - y); newX = x; newY = y; }
                        else if (mode === 'RESIZE_TR') { newW = x - b.x; newH = b.h + (b.y - y); newY = y; }
                        else if (mode === 'RESIZE_BL') { newW = b.w + (b.x - x); newH = y - b.y; newX = x; }
                        else if (mode === 'RESIZE_BR') { newW = x - b.x; newH = y - b.y; }
                        
                        // Prevent too small or negative sizes
                        if (newW < 10) { newX = b.x; newW = b.w; }
                        if (newH < 10) { newY = b.y; newH = b.h; }
                        return { ...b, x: newX, y: newY, w: newW, h: newH };
                    }));
                }
            };

            const handleMouseUp = async () => {
                if (mode === 'IDLE') return;
                
                if (mode === 'PANNING') { 
                    setMode('IDLE'); 
                    return; 
                }

                if (mode === 'DRAWING') {
                    setMode('IDLE');
                    if (currentRect && currentRect.w > 10 && currentRect.h > 10) {
                        const newBoxId = Date.now().toString();
                        
                        const canvas = document.createElement('canvas');
                        canvas.width = imageObj.width;
                        canvas.height = imageObj.height;
                        const ctx = canvas.getContext('2d');
                        ctx.drawImage(imageObj, 0, 0);
                        const sx = Math.max(0, Math.floor(currentRect.x));
                        const sy = Math.max(0, Math.floor(currentRect.y));
                        const pixel = ctx.getImageData(sx, sy, 1, 1).data;
                        const localBgColor = `#${((1 << 24) + (pixel[0] << 16) + (pixel[1] << 8) + pixel[2]).toString(16).slice(1)}`;

                        const newBox = {
                            id: newBoxId,
                            ...currentRect,
                            originalText: "인식 중...",
                            currentText: "",
                            font: "Inter",
                            size: Math.max(14, Math.floor(currentRect.h * 0.7)),
                            color: "#FFFFFF",
                            bgColor: localBgColor,
                            align: "center",
                            valign: "middle",
                            weight: "Bold"
                        };
                        
                        const newBoxes = [...boxes, newBox];
                        setBoxes(newBoxes);
                        pushHistory(newBoxes);
                        setSelectedBoxId(newBoxId);
                        
                        await extractTextFromBox(newBox);
                    }
                    setCurrentRect(null);
                } else if (mode === 'DRAWING_CONTEXT') {
                    setMode('IDLE');
                    if (currentRect && currentRect.w > 10 && currentRect.h > 10) {
                        setContextRegions(prev => [...prev, { id: Date.now().toString(), ...currentRect }]);
                    }
                    setCurrentRect(null);
                } else if (mode === 'MOVING' || mode.startsWith('RESIZE_')) {
                    setMode('IDLE');
                    pushHistory(boxes); // History save on mouse release
                }
            };

            const extractTextFromBox = async (box) => {
                if (!apiKey) {
                    updateBox(box.id, { originalText: "API 키 입력 필요", currentText: "" }, true);
                    return;
                }

                setIsExtracting(true);

                try {
                    const canvas = document.createElement('canvas');
                    canvas.width = box.w;
                    canvas.height = box.h;
                    const ctx = canvas.getContext('2d');
                    ctx.drawImage(imageObj, box.x, box.y, box.w, box.h, 0, 0, box.w, box.h);
                    const base64Image = canvas.toDataURL('image/jpeg').split(',')[1];

                    // Prepare Parts Array for Gemini
                    const parts = [
                        { text: "Analyze the FIRST image crop containing text. Extract the text accurately from the FIRST image. If there are additional images provided, use them ONLY as context/reference to estimate the overall tone, main text color, background color, font weight, and closest font family. Return ONLY a valid JSON object matching this schema: {\"text\": \"extracted text (empty if none)\", \"color\": \"#HEXCOLOR\", \"bgColor\": \"#HEXCOLOR\", \"weight\": \"Bold\" or \"Normal\", \"fontFamily\": \"Inter\" or \"Arial\" or \"Malgun Gothic\" or \"Nanum Gothic\"}." },
                        { inlineData: { mimeType: "image/jpeg", data: base64Image } }
                    ];

                    // Append Context Regions if available
                    if (contextRegionsRef.current.length > 0) {
                        contextRegionsRef.current.forEach(ctxBox => {
                            const ctxCanvas = document.createElement('canvas');
                            ctxCanvas.width = ctxBox.w;
                            ctxCanvas.height = ctxBox.h;
                            const ctxCtx = ctxCanvas.getContext('2d');
                            ctxCtx.drawImage(imageObj, ctxBox.x, ctxBox.y, ctxBox.w, ctxBox.h, 0, 0, ctxBox.w, ctxBox.h);
                            const ctxBase64 = ctxCanvas.toDataURL('image/jpeg').split(',')[1];
                            parts.push({ inlineData: { mimeType: "image/jpeg", data: ctxBase64 } });
                        });
                    }

                    const response = await fetch(`https://generativelanguage.googleapis.com/v1beta/models/gemini-3.1-pro-preview:generateContent?key=${apiKey}`, {
                        method: 'POST',
                        headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({
                            contents: [{ parts: parts }],
                            generationConfig: { responseMimeType: "application/json" }
                        })
                    });

                    const data = await response.json();
                    if (data.error) throw new Error(data.error.message);
                    
                    const rawText = data.candidates?.[0]?.content?.parts?.[0]?.text || "{}";
                    let parsed = {};
                    try {
                        const cleanText = rawText.replace(/```json/gi, '').replace(/```/g, '').trim();
                        parsed = JSON.parse(cleanText);
                    } catch (e) { console.error("JSON Parsing failed", e); }
                    
                    const isValidHex = (hex) => /^#([0-9A-F]{3}){1,2}$/i.test(hex);
                    const validFonts = ['Inter', 'Arial', 'Malgun Gothic', 'Nanum Gothic'];
                    const detectedFont = validFonts.includes(parsed.fontFamily) ? parsed.fontFamily : "Inter";

                    updateBox(box.id, { 
                        originalText: parsed.text || "텍스트 없음", 
                        currentText: parsed.text || "",
                        color: parsed.color && isValidHex(parsed.color) ? parsed.color : box.color,
                        bgColor: parsed.bgColor && isValidHex(parsed.bgColor) ? parsed.bgColor : box.bgColor,
                        weight: parsed.weight || box.weight,
                        font: detectedFont
                    }, true);

                } catch (error) {
                    updateBox(box.id, { originalText: "오류 발생", currentText: "" }, true);
                } finally {
                    setIsExtracting(false);
                }
            };

            const updateBox = (id, changes, isFinal = false) => {
                setBoxes(prev => {
                    const next = prev.map(b => b.id === id ? { ...b, ...changes } : b);
                    if (isFinal) pushHistory(next);
                    return next;
                });
            };

            // Global Apply All Changes
            const applyAllChanges = () => {
                if (!imageObj || boxes.length === 0) return;
                
                const canvas = document.createElement('canvas');
                canvas.width = imageObj.width;
                canvas.height = imageObj.height;
                const ctx = canvas.getContext('2d');
                
                ctx.drawImage(imageObj, 0, 0);
                
                boxes.forEach(box => {
                    ctx.fillStyle = box.bgColor || '#1E293B';
                    ctx.fillRect(box.x, box.y, box.w, box.h);

                    ctx.fillStyle = box.color;
                    ctx.font = `${box.weight === 'Bold' ? 'bold' : 'normal'} ${box.size}px ${box.font}`;
                    ctx.textAlign = box.align === 'center' ? 'center' : (box.align === 'right' ? 'right' : 'left');
                    ctx.textBaseline = box.valign === 'middle' ? 'middle' : (box.valign === 'bottom' ? 'bottom' : 'top');

                    let textX = box.x;
                    if (box.align === 'center') textX = box.x + box.w / 2;
                    else if (box.align === 'right') textX = box.x + box.w;

                    let textY = box.y;
                    if (box.valign === 'middle') textY = box.y + box.h / 2;
                    else if (box.valign === 'bottom') textY = box.y + box.h;

                    ctx.fillText(box.currentText, textX, textY);
                });
                
                const newImgData = canvas.toDataURL('image/png');
                const newImg = new Image();
                newImg.onload = () => {
                    setImageObj(newImg);
                    setBoxes([]); 
                    setSelectedBoxId(null);
                    pushHistory([], newImgData); // Push baked image to history!
                };
                newImg.src = newImgData;
            };

            const executeReset = () => {
                setImage(null);
                setImageObj(null);
                setBoxes([]);
                setContextRegions([]);
                setSelectedBoxId(null);
                setMode('IDLE');
                setView({ scale: 1, panX: 0, panY: 0 });
                historyRef.current = [{ boxes: [], imageSrc: null }];
                historyStepRef.current = 0;
                setHistoryStep(0);
                setShowResetModal(false);
            };

            const selectedBox = boxes.find(b => b.id === selectedBoxId);
            let activeCursor = hoverCursor;
            if (mode === 'PANNING') activeCursor = 'cursor-grabbing';
            else if (activeTool === 'PAN') activeCursor = 'cursor-grab';
            else if (mode.startsWith('RESIZE') || mode === 'MOVING') activeCursor = 'cursor-move';

            return (
                <div className="flex h-screen w-full font-sans text-sm relative">
                    {/* Reset Confirm Modal */}
                    {showResetModal && (
                        <div className="fixed inset-0 z-[100] flex items-center justify-center bg-black/50 backdrop-blur-sm">
                            <div className="bg-slate-800 border border-slate-700 p-6 rounded-xl shadow-2xl max-w-sm w-full mx-4">
                                <h3 className="text-lg font-bold text-white mb-2 flex items-center gap-2">
                                    <IconTrash2 />
                                    초기화 확인
                                </h3>
                                <p className="text-slate-300 text-sm mb-6">모든 작업 내역이 삭제되고 초기 화면으로 돌아갑니다. 계속하시겠습니까?</p>
                                <div className="flex justify-end gap-3">
                                    <button onClick={() => setShowResetModal(false)} className="px-4 py-2 rounded-lg text-slate-300 hover:bg-slate-700 transition">취소</button>
                                    <button onClick={executeReset} className="px-4 py-2 rounded-lg bg-red-600 hover:bg-red-700 text-white transition font-medium">초기화</button>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* Left Sidebar */}
                    <div className="w-16 flex flex-col items-center py-4 gap-4 sidebar-left border-r border-slate-700 shrink-0">
                        {/* Tools (DRAW / PAN / CONTEXT) */}
                        <div className="flex flex-col gap-2 w-full px-2">
                            <button 
                                onClick={() => setActiveTool('DRAW')} 
                                className={`p-2 w-full flex justify-center rounded-lg transition ${activeTool === 'DRAW' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:text-white hover:bg-slate-700'}`} 
                                title="텍스트 영역 지정 도구 (Draw)"
                            >
                                <IconCrosshair />
                            </button>
                            <button 
                                onClick={() => setActiveTool('CONTEXT')} 
                                className={`p-2 w-full flex justify-center rounded-lg transition ${activeTool === 'CONTEXT' ? 'bg-emerald-600 text-white' : 'text-slate-400 hover:text-white hover:bg-slate-700'}`} 
                                title="참조(Context) 영역 추가"
                            >
                                <IconFocus />
                            </button>
                            <button 
                                onClick={() => setActiveTool('PAN')} 
                                className={`p-2 w-full flex justify-center rounded-lg transition ${activeTool === 'PAN' ? 'bg-blue-600 text-white' : 'text-slate-400 hover:text-white hover:bg-slate-700'}`} 
                                title="화면 이동 도구 (Pan)"
                            >
                                <IconHand />
                            </button>
                        </div>
                        
                        {/* Undo & Redo Toolbars */}
                        <div className="flex flex-col gap-2 w-full px-2 border-t border-slate-700/50 pt-4">
                            <button 
                                onClick={undo} 
                                disabled={historyStep === 0} 
                                className={`p-2 w-full flex justify-center rounded-lg transition ${historyStep > 0 ? 'text-white hover:bg-slate-700' : 'text-slate-600 cursor-not-allowed'}`} 
                                title="Undo (Ctrl+Z)"
                            >
                                <IconUndo />
                            </button>
                            <button 
                                onClick={redo} 
                                disabled={historyStep === historyRef.current.length - 1} 
                                className={`p-2 w-full flex justify-center rounded-lg transition ${historyStep < historyRef.current.length - 1 ? 'text-white hover:bg-slate-700' : 'text-slate-600 cursor-not-allowed'}`} 
                                title="Redo (Ctrl+Y)"
                            >
                                <IconRedo />
                            </button>
                        </div>

                        <div onClick={() => setShowResetModal(true)} className="p-2 text-slate-400 hover:text-red-400 cursor-pointer mt-auto transition" title="모두 지우기 및 새로 시작">
                            <IconTrash2 />
                        </div>
                    </div>

                    {/* Main Content Area */}
                    <div className="flex-1 flex flex-col min-w-0">
                        {/* Top Bar */}
                        <div className="flex items-center h-16 border-b border-slate-700 bg-[#1E293B] z-10 shrink-0 px-6 gap-6">
                            {/* Logo */}
                            <div className="flex items-center gap-3 shrink-0">
                                <div className="w-8 h-8 bg-blue-600 rounded flex items-center justify-center text-white shadow-sm">
                                    <span className="font-serif italic font-bold text-lg">T</span>
                                </div>
                                <span className="text-white font-semibold tracking-wide text-lg">Text in Image Editor</span>
                            </div>

                            <div className="w-px h-8 bg-slate-700 shrink-0"></div>

                            {/* API Key */}
                            <div className="flex items-center gap-3 shrink-0">
                                <label className="text-slate-400 text-sm font-medium">Gemini API Key</label>
                                <input 
                                    type="password" 
                                    value={apiKey}
                                    onChange={(e) => setApiKey(e.target.value)}
                                    className="bg-slate-900/50 border border-slate-600 rounded-lg px-4 py-2 w-64 focus:outline-none focus:border-blue-500 focus:ring-1 focus:ring-blue-500 text-slate-200 text-sm transition-all"
                                    placeholder="Paste your key here..."
                                />
                            </div>

                            <div className="flex-1 min-w-[20px]"></div>

                            {/* Actions */}
                            <div className="flex shrink-0 gap-3">
                                <label className="flex items-center gap-2 px-4 py-2 bg-slate-800 border border-slate-600 rounded-lg cursor-pointer hover:bg-slate-700 transition-colors text-sm text-slate-200 font-medium">
                                    <IconUpload />
                                    <span>File Upload</span>
                                    <input type="file" accept="image/*" onChange={handleImageUpload} className="hidden" />
                                </label>
                            </div>
                        </div>

                        {/* Canvas Container Area */}
                        <div ref={containerRef} className="flex-1 canvas-container">
                            {!image ? (
                                <div className="flex flex-col items-center justify-center h-full text-slate-400 absolute w-full pointer-events-none z-10">
                                    <div className="w-32 h-32 bg-slate-800/50 rounded-3xl flex items-center justify-center mb-8 border border-slate-700/50">
                                        <IconImage />
                                    </div>
                                    <h2 className="text-2xl font-bold text-white mb-4">Text in Image Editor</h2>
                                    <p className="text-center mb-8">이미지를 업로드하여 지능형 텍스트 교<br/>체를 시작하세요.</p>
                                    <label className="px-8 py-3 bg-blue-600 hover:bg-blue-700 text-white rounded-lg cursor-pointer font-medium transition shadow-lg shadow-blue-600/20 pointer-events-auto">
                                        File Upload
                                        <input type="file" accept="image/*" onChange={handleImageUpload} className="hidden" />
                                    </label>
                                </div>
                            ) : (
                                <div 
                                    style={{
                                        transform: `translate(${view.panX}px, ${view.panY}px) scale(${view.scale})`,
                                        transformOrigin: '0 0',
                                        willChange: 'transform',
                                        position: 'absolute',
                                        top: 0,
                                        left: 0
                                    }}
                                >
                                    <canvas 
                                        ref={displayCanvasRef}
                                        onMouseDown={handleMouseDown}
                                        onMouseMove={handleMouseMove}
                                        onMouseUp={handleMouseUp}
                                        onMouseLeave={handleMouseUp}
                                        className={activeCursor}
                                    />
                                </div>
                            )}

                            {/* Zoom Controls */}
                            {image && (
                                <div className="absolute bottom-6 right-6 flex bg-slate-800 rounded-lg border border-slate-700 shadow-xl overflow-hidden z-20">
                                    <button onClick={() => setView(v => ({...v, scale: Math.min(10, v.scale * 1.2)}))} className="p-2 text-slate-400 hover:text-white hover:bg-slate-700 transition" title="Zoom In">
                                        <IconZoomIn />
                                    </button>
                                    <div className="w-px bg-slate-700"></div>
                                    <button onClick={() => setView(v => ({...v, scale: Math.max(0.05, v.scale * 0.8)}))} className="p-2 text-slate-400 hover:text-white hover:bg-slate-700 transition" title="Zoom Out">
                                        <IconZoomOut />
                                    </button>
                                    <div className="w-px bg-slate-700"></div>
                                    <button onClick={() => {
                                        const cw = containerRef.current.clientWidth;
                                        const ch = containerRef.current.clientHeight;
                                        const fitScale = Math.min(cw / imageObj.width, ch / imageObj.height) * 0.9;
                                        setView({ panX: (cw - imageObj.width * fitScale) / 2, panY: (ch - imageObj.height * fitScale) / 2, scale: fitScale });
                                    }} className="px-3 py-2 text-slate-400 hover:text-white hover:bg-slate-700 transition font-bold text-xs" title="Fit to Screen">
                                        FIT
                                    </button>
                                </div>
                            )}
                        </div>
                    </div>

                    {/* Right Sidebar */}
                    <div className="w-80 sidebar-right flex flex-col shrink-0">
                        <div className="p-6 border-b border-slate-700/50 flex items-center gap-2 text-blue-400">
                            <span className="font-serif italic text-lg mr-1">T</span>
                            <span className="font-medium text-white">텍스트 교체</span>
                        </div>

                        {!selectedBox ? (
                            <div className="flex-1 flex flex-col p-6">
                                <div className="flex-1 flex flex-col items-center justify-center text-center text-slate-400">
                                    <div className="w-12 h-12 bg-slate-800 rounded-xl flex items-center justify-center mb-4">
                                        <IconInfo />
                                    </div>
                                    <p>텍스트 교체 영역을 드래그하거나<br/>교체된 텍스트 상자를 클릭하세요</p>
                                </div>
                                
                                {/* Context Regions Info */}
                                {contextRegions.length > 0 && (
                                    <div className="mb-4 p-4 bg-emerald-900/20 border border-emerald-700/50 rounded-lg animate-fade-in text-left">
                                        <div className="flex justify-between items-center mb-2">
                                            <span className="text-emerald-400 font-bold text-xs flex items-center gap-1.5"><IconFocus /> 참조(Context) 적용됨</span>
                                            <button onClick={() => setContextRegions([])} className="text-slate-400 hover:text-red-400 text-xs underline transition">모두 지우기</button>
                                        </div>
                                        <p className="text-slate-400 text-[11px] leading-relaxed">
                                            지정된 {contextRegions.length}개의 참조 영역을 바탕으로 AI가 새로운 텍스트의 톤앤매너, 배경, 색상을 맞춰 예측합니다.
                                        </p>
                                    </div>
                                )}

                                {boxes.length > 0 && (
                                    <div className="mt-auto animate-fade-in">
                                        <div className="text-center text-slate-400 mb-4 text-xs">
                                            현재 {boxes.length}개의 텍스트 변경사항이 대기 중입니다.<br/>원하는 수정이 끝나면 일괄 적용하세요.
                                        </div>
                                        <button 
                                            onClick={applyAllChanges}
                                            className="w-full bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg py-3.5 flex justify-center items-center gap-2 font-medium transition shadow-lg shadow-emerald-600/20"
                                        >
                                            <IconCheck />
                                            모든 변경사항 최종 적용 (Apply All)
                                        </button>
                                    </div>
                                )}
                            </div>
                        ) : (
                            <div className="p-6 flex-1 overflow-y-auto flex flex-col gap-6">
                                <div>
                                    <label className="text-xs text-slate-400 mb-2 block">AI 텍스트 분석</label>
                                    <div className="bg-slate-800 border border-slate-700 rounded-lg p-4 relative">
                                        {isExtracting ? (
                                            <span className="text-slate-400 italic">스마트 분석 및 속성 추출 중...</span>
                                        ) : (
                                            <span className="text-white font-medium">"{selectedBox.originalText}"</span>
                                        )}
                                    </div>
                                </div>

                                <div>
                                    <label className="text-xs text-slate-400 mb-2 block">내용</label>
                                    <textarea 
                                        value={selectedBox.currentText}
                                        onChange={(e) => updateBox(selectedBox.id, { currentText: e.target.value })}
                                        onBlur={() => updateBox(selectedBox.id, {}, true)}
                                        className="w-full bg-slate-800 border border-slate-700 rounded-lg p-3 text-white focus:outline-none focus:border-blue-500 min-h-[100px] resize-none"
                                        placeholder="수정할 텍스트 입력"
                                    />
                                </div>

                                <div className="flex gap-4">
                                    <div className="flex-1">
                                        <label className="text-xs text-slate-400 mb-2 block">수평 정렬</label>
                                        <div className="flex bg-slate-800 rounded-lg border border-slate-700 p-1">
                                            {['left', 'center', 'right'].map(align => (
                                                <button 
                                                    key={align}
                                                    onClick={() => updateBox(selectedBox.id, { align }, true)}
                                                    className={`flex-1 py-1.5 rounded flex items-center justify-center ${selectedBox.align === align ? 'bg-slate-700 text-white' : 'text-slate-400 hover:text-white'}`}
                                                >
                                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d={align === 'left' ? "M21 6H3M15 12H3M21 18H3" : align === 'center' ? "M21 6H3M17 12H7M21 18H3" : "M21 6H3M21 12H9M21 18H3"}/></svg>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                    <div className="flex-1">
                                        <label className="text-xs text-slate-400 mb-2 block">수직 정렬</label>
                                        <div className="flex bg-slate-800 rounded-lg border border-slate-700 p-1">
                                            {['top', 'middle', 'bottom'].map(valign => (
                                                <button 
                                                    key={valign}
                                                    onClick={() => updateBox(selectedBox.id, { valign }, true)}
                                                    className={`flex-1 py-1.5 rounded flex items-center justify-center ${selectedBox.valign === valign ? 'bg-slate-700 text-white' : 'text-slate-400 hover:text-white'}`}
                                                >
                                                    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2"><path d={valign === 'top' ? "M4 4h16M12 8v12" : valign === 'middle' ? "M4 12h16M12 4v16" : "M4 20h16M12 4v12"}/></svg>
                                                </button>
                                            ))}
                                        </div>
                                    </div>
                                </div>

                                <div>
                                    <label className="text-xs text-slate-400 mb-2 block">글꼴</label>
                                    <select 
                                        value={selectedBox.font}
                                        onChange={(e) => updateBox(selectedBox.id, { font: e.target.value }, true)}
                                        className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2.5 text-white focus:outline-none focus:border-blue-500"
                                    >
                                        <option value="Inter">Inter</option>
                                        <option value="Arial">Arial</option>
                                        <option value="Malgun Gothic">맑은 고딕</option>
                                        <option value="Nanum Gothic">나눔고딕</option>
                                    </select>
                                </div>

                                <div className="flex gap-4">
                                    <div className="flex-1">
                                        <label className="text-xs text-slate-400 mb-2 block">크기</label>
                                        <input 
                                            type="number" 
                                            value={selectedBox.size}
                                            onChange={(e) => updateBox(selectedBox.id, { size: parseInt(e.target.value) || 10 })}
                                            onBlur={() => updateBox(selectedBox.id, {}, true)}
                                            className="w-full bg-slate-800 border border-slate-700 rounded-lg p-2 text-white focus:outline-none focus:border-blue-500"
                                        />
                                    </div>
                                    <div className="flex-1">
                                        <label className="text-xs text-slate-400 mb-2 block">텍스트 색상</label>
                                        <div className="flex bg-slate-800 border border-slate-700 rounded-lg p-1.5 items-center gap-2">
                                            <input 
                                                type="color" 
                                                value={selectedBox.color}
                                                onChange={(e) => updateBox(selectedBox.id, { color: e.target.value })}
                                                onBlur={() => updateBox(selectedBox.id, {}, true)}
                                                className="w-6 h-6 rounded cursor-pointer border-0 p-0"
                                                style={{backgroundColor: selectedBox.color}}
                                            />
                                            <span className="text-sm text-slate-300 flex-1">{selectedBox.color.toUpperCase()}</span>
                                        </div>
                                    </div>
                                </div>

                                <div>
                                    <label className="text-xs text-slate-400 mb-2 block">배경 색상</label>
                                    <div className="flex bg-slate-800 border border-slate-700 rounded-lg p-1.5 items-center gap-2">
                                        <input 
                                            type="color" 
                                            value={selectedBox.bgColor}
                                            onChange={(e) => updateBox(selectedBox.id, { bgColor: e.target.value })}
                                            onBlur={() => updateBox(selectedBox.id, {}, true)}
                                            className="w-6 h-6 rounded cursor-pointer border-0 p-0"
                                            style={{backgroundColor: selectedBox.bgColor}}
                                        />
                                        <span className="text-sm text-slate-300 flex-1">{selectedBox.bgColor.toUpperCase()}</span>
                                    </div>
                                </div>

                                <div>
                                    <label className="text-xs text-slate-400 mb-2 block">두께</label>
                                    <div className="flex bg-slate-800 rounded-lg border border-slate-700 p-1">
                                        <button 
                                            onClick={() => updateBox(selectedBox.id, { weight: 'Normal' }, true)}
                                            className={`flex-1 py-2 rounded text-sm ${selectedBox.weight === 'Normal' ? 'bg-slate-700 text-white' : 'text-slate-400 hover:text-white'}`}
                                        >
                                            Normal
                                        </button>
                                        <button 
                                            onClick={() => updateBox(selectedBox.id, { weight: 'Bold' }, true)}
                                            className={`flex-1 py-2 rounded text-sm font-bold ${selectedBox.weight === 'Bold' ? 'bg-slate-700 text-white' : 'text-slate-400 hover:text-white'}`}
                                        >
                                            Bold
                                        </button>
                                    </div>
                                </div>

                                <button 
                                    className="w-full bg-blue-600 hover:bg-blue-700 text-white rounded-lg py-3 mt-4 flex justify-center items-center gap-2 font-medium transition shadow-lg shadow-blue-600/20"
                                    onClick={() => setSelectedBoxId(null)}
                                >
                                    현재 상자 선택 해제 (계속 작업하기)
                                </button>
                            </div>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
